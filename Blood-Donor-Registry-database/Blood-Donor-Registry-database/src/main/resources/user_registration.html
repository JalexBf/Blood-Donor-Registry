<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:insert="fragments/header :: header"></head>

<body>
<!-- Include the header fragment -->
<div th:insert="fragments/menu :: menu"></div>
<main>
    <!-- Content specific to this page -->
    <!-- Include the blood donor registration fragment -->
    <div class="container" >
        <h3>User Registration</h3>
        <form th:action="@{/saveUser}" method="post" th:object="${user}">
            <!-- Personal Information -->
            <div class="form-group row">
                <label for="username" class="col-sm-2 col-form-label"> Username</label>
                <div class="col-sm-4">
                    <input type="text" class="form-control" th:field="*{username}" id="username"/>
                </div>
            </div>
            <div class="form-group row">
                <label for="password" class="col-sm-2 col-form-label"> Password </label>
                <div class="col-sm-4">
                    <input type="password" class="form-control"  id="password" th:field="*{password}"/>
                </div>
            </div>
            <div class="form-group row">
                <label for="email" class="col-sm-2 col-form-label"> Email</label>
                <div class="col-sm-4">
                    <input type="text" class="form-control"  th:field="*{email}" id="email"/>
                </div>
            </div>
            <!-- Blood Donor Information -->
            <div class="form-group row">
                <label for="amka" class="col-sm-2 col-form-label">AMKA</label>
                <div class="col-sm-4">
                    <input type="text" class="form-control" th:field="*{amka}" id="amka"/>
                </div>
            </div>
            <div class="form-group row">
                <label for="firstname" class="col-sm-2 col-form-label">First Name</label>
                <div class="col-sm-4">
                    <input type="text" class="form-control" th:field="*{firstname}" id="firstname"/>
                </div>
            </div>
            <div class="form-group row">
                <label for="lastname" class="col-sm-2 col-form-label">Last Name</label>
                <div class="col-sm-4">
                    <input type="text" class="form-control" th:field="*{lastname}" id="lastname"/>
                </div>
            </div>
            <div class="form-group row">
                <label for="birthdate" class="col-sm-2 col-form-label">Age</label>
                <div class="col-sm-4">
                    <input type="date" class="form-control" th:field="*{birthdate}" id="birthdate"/>
                </div>
            </div>
            <div class="form-group row">
                <label for="sex" class="col-sm-2 col-form-label">Sex</label>
                <div class="col-sm-4">
                    <select class="form-control" th:field="*{sex}" id="sex">
                        <option value="MALE">Άνδρας</option>
                        <option value="FEMALE">Γυναίκα</option>
                    </select>
                </div>
            </div>
            <div class="form-group row">
                <label for="region" class="col-sm-2 col-form-label">Region</label>
                <div class="col-sm-4">
                    <input type="text" class="form-control" th:field="*{region}" id="region"/>
                </div>
            </div>
            <div class="form-group row">
                <label for="phone" class="col-sm-2 col-form-label">Phone Number</label>
                <div class="col-sm-4">
                    <input type="text" class="form-control" th:field="*{phone}" id="phone"/>
                </div>
            </div>
            <div class="form-group row">
                <label for="bloodworkFilePath" class="col-sm-2 col-form-label">Bloodwork File (PDF/DOCX)</label>
                <div class="col-sm-4">
                    <input type="file" class="form-control" th:field="*{bloodworkFilePath}" id="bloodworkFilePath"/>
                </div>
            </div>

            <div><input type="submit" class="btn btn-primary" value="Sign Up"/></div>
        </form>
        <div th:text="${msg}"></div>
    </div>
</main>

<!-- Include the footer fragment -->
<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
